version: "3.9"

services:
  ingest:
    build: .
    command: python ingest.py --data-dir data/slice/
    volumes:
      - .:/app
    profiles: ["ingest"]

  api:
    build: .
    # Index is loaded inside FastAPI's lifespan startup handler (api/main.py)
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
    environment:
      - USE_TF=0
      - TF_CPP_MIN_LOG_LEVEL=3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s

  ui:
    build: .
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_BASE=http://api:8000

volumes:
  hf_cache:
